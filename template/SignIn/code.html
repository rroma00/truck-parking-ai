<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign In - Nexus Logistics | ParkLog AI</title>
<!-- Material Symbols Link -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Google Fonts: Manrope & Inter -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "outline": "#76767f",
            "tertiary-container": "#3c2100",
            "secondary-fixed": "#d8e2ff",
            "inverse-on-surface": "#eef1f8",
            "tertiary-fixed": "#ffdcbc",
            "inverse-surface": "#2d3136",
            "surface-container-highest": "#dfe2e9",
            "background": "#f7f9ff",
            "surface-container": "#ebeef5",
            "primary-container": "#1b254b",
            "tertiary-fixed-dim": "#eebe8d",
            "on-tertiary-fixed-variant": "#61401a",
            "on-secondary-fixed-variant": "#004395",
            "on-tertiary": "#ffffff",
            "secondary-container": "#2170e4",
            "outline-variant": "#c6c5cf",
            "inverse-primary": "#bbc4f4",
            "primary-fixed": "#dde1ff",
            "on-primary-container": "#838db9",
            "secondary": "#0058be",
            "on-primary-fixed": "#0e193e",
            "tertiary": "#1f0f00",
            "primary-fixed-dim": "#bbc4f4",
            "on-primary-fixed-variant": "#3b456c",
            "on-tertiary-container": "#b0865a",
            "surface-container-high": "#e5e8ef",
            "on-surface-variant": "#45464e",
            "surface-tint": "#535c86",
            "surface-container-low": "#f1f4fb",
            "primary": "#050f36",
            "on-secondary-fixed": "#001a42",
            "on-background": "#181c21",
            "surface-bright": "#f7f9ff",
            "on-error": "#ffffff",
            "surface": "#f7f9ff",
            "on-secondary": "#ffffff",
            "surface-container-lowest": "#ffffff",
            "on-error-container": "#93000a",
            "on-surface": "#181c21",
            "surface-variant": "#dfe2e9",
            "on-secondary-container": "#fefcff",
            "error-container": "#ffdad6",
            "on-tertiary-fixed": "#2c1700",
            "error": "#ba1a1a",
            "surface-dim": "#d7dae1",
            "secondary-fixed-dim": "#adc6ff",
            "on-primary": "#ffffff"
          },
          "borderRadius": {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
          "fontFamily": {
            "headline": ["Manrope", "sans-serif"],
            "body": ["Inter", "sans-serif"],
            "label": ["Inter", "sans-serif"]
          }
        },
      },
    }
  </script>
<style>
    body {
      font-family: 'Inter', sans-serif;
    }
    .headline-font {
      font-family: 'Manrope', sans-serif;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .bg-grid-pattern {
      background-image: radial-gradient(#dfe2e9 1px, transparent 1px);
      background-size: 32px 32px;
    }
  </style>
</head>
<body class="bg-surface text-on-background min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden">
<!-- Subtle Background Ornamentation -->
<div class="absolute inset-0 bg-grid-pattern opacity-40 -z-10"></div>
<div class="absolute -top-24 -left-24 w-96 h-96 bg-secondary/5 rounded-full blur-3xl -z-10"></div>
<div class="absolute -bottom-24 -right-24 w-96 h-96 bg-primary/5 rounded-full blur-3xl -z-10"></div>
<!-- Main Container -->
<main class="w-full max-w-[440px] z-10">
<!-- Branding Anchor (Logo) -->
<div class="flex flex-col items-center mb-8">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-secondary text-4xl" data-icon="hub">hub</span>
<span class="text-2xl font-bold tracking-tight text-primary headline-font">Nexus Logistics</span>
</div>
<div class="px-3 py-1 bg-surface-container-high text-primary font-bold text-[10px] tracking-widest rounded-full uppercase">
        ParkLog AI Powered
      </div>
</div>
<!-- Login Card -->
<section class="bg-surface-container-lowest rounded-xl p-8 md:p-10 shadow-[0_12px_40px_rgba(24,28,33,0.06)] ring-1 ring-outline-variant/10">
<!-- Header -->
<header class="text-center mb-8">
<h1 class="text-2xl font-extrabold headline-font text-primary tracking-tight mb-2">Welcome Back</h1>
<p class="text-on-surface-variant text-sm">Sign in to manage your parking lot operations</p>
</header>
<!-- Sign In Form -->
<form action="#" class="space-y-6" method="POST">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-xs font-semibold text-primary tracking-wide uppercase" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-xl" data-icon="mail">mail</span>
<input class="w-full pl-11 pr-4 py-3 bg-surface-container-low border-none rounded-lg text-sm focus:ring-2 focus:ring-secondary/20 focus:bg-surface-container-lowest transition-all placeholder:text-outline/60" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block text-xs font-semibold text-primary tracking-wide uppercase" for="password">Password</label>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-xl" data-icon="lock">lock</span>
<input class="w-full pl-11 pr-12 py-3 bg-surface-container-low border-none rounded-lg text-sm focus:ring-2 focus:ring-secondary/20 focus:bg-surface-container-lowest transition-all placeholder:text-outline/60" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-secondary transition-colors" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Utilities -->
<div class="flex items-center justify-between">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="w-4 h-4 rounded border-outline-variant text-secondary focus:ring-secondary/20 bg-surface-container-low" type="checkbox"/>
<span class="text-xs text-on-surface-variant group-hover:text-primary transition-colors">Remember me</span>
</label>
<a class="text-xs font-semibold text-secondary hover:underline transition-all" href="#">Forgot password?</a>
</div>
<!-- Action Buttons -->
<div class="space-y-4 pt-2">
<button class="w-full py-3.5 px-6 bg-gradient-to-r from-primary to-primary-container text-white font-bold rounded-lg hover:shadow-lg hover:opacity-95 transition-all flex items-center justify-center gap-2" type="submit">
            Sign In
          </button>
</div>
</form>
<!-- Footer Action -->
<footer class="mt-8 pt-6 border-t border-outline-variant/15 text-center">
<p class="text-xs text-on-surface-variant">
          Don't have an account? 
          <a class="text-secondary font-bold hover:underline ml-1" href="#">Start Your Free Trial</a>
</p>
</footer>
</section>
<!-- Global Footer -->
<footer class="mt-8 flex justify-center gap-6">
<a class="text-[10px] font-medium text-outline uppercase tracking-wider hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="text-[10px] font-medium text-outline uppercase tracking-wider hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="text-[10px] font-medium text-outline uppercase tracking-wider hover:text-primary transition-colors" href="#">Support</a>
</footer>
<div class="mt-6 text-center">
<p class="text-[10px] font-medium text-outline/60 uppercase tracking-[0.2em]">© 2024 Nexus Logistics. Precision Architected.</p>
</div>
</main>
<!-- Contextual Image Decorative Side (Hidden on small screens) -->
</body></html>
